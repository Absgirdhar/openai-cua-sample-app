services:
  # Backend: Fastify runner with Playwright/Chromium
  - type: web
    name: cua-runner
    runtime: node
    region: oregon
    plan: free
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @cua-sample/replay-schema build &&
      pnpm --filter @cua-sample/scenario-kit build &&
      pnpm --filter @cua-sample/browser-runtime build &&
      pnpm --filter @cua-sample/runner-core build &&
      pnpm --filter @cua-sample/runner build &&
      PLAYWRIGHT_BROWSERS_PATH=0 pnpm --filter @cua-sample/runner exec playwright install chromium
    startCommand: HOST=0.0.0.0 PLAYWRIGHT_BROWSERS_PATH=0 pnpm --filter @cua-sample/runner start
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 4001
      - key: CUA_DEFAULT_MODEL
        value: gpt-5.4
      - key: CUA_RESPONSES_MODE
        value: auto

  # Frontend: Next.js operator console
  - type: web
    name: cua-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @cua-sample/replay-schema build &&
      pnpm --filter @cua-sample/demo-web build
    startCommand: pnpm --filter @cua-sample/demo-web start
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: RUNNER_BASE_URL
        fromService:
          name: cua-runner
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_CUA_DEFAULT_MODEL
        value: gpt-5.4
      - key: NEXT_PUBLIC_CUA_DEFAULT_MAX_RESPONSE_TURNS
        value: "24"
